name: Release Kardoo Windows

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        default: '1.0.0'

jobs:
  prepare:
    name: Prepare version tag
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.normalise_version.outputs.version }}
    steps:
      - name: Normalise version tag
        id: normalise_version
        shell: bash
        run: |
          if [ "${{ github.event.release.tag_name }}" == "" ]; then
            version=$(echo ${{ github.event.inputs.tag }} | sed -e 's/v//g')
          else
            version=$(echo ${{ github.event.release.tag_name }} | sed -e 's/v//g')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  release-windows:
    name: Release Windows (${{ matrix.platform }})
    needs: prepare
    runs-on: windows-latest

    strategy:
      matrix:
        platform:
          - windows/amd64
          - windows/arm64

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Normalise platform tag
        id: normalise_platform
        shell: bash
        run: |
          tag=$(echo ${{ matrix.platform }} | sed -e 's/\//_/g' -e 's/amd64/x64/g')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Normalise platform name
        id: normalise_platform_name
        shell: bash
        run: |
          pname=$(echo "${{ matrix.platform }}" | sed 's/windows\///g')
          echo "pname=$pname" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Chocolatey packages
        uses: crazy-max/ghaction-chocolatey@v2
        with:
          args: install nsis jq

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend assets
        shell: bash
        run: |
          npm install -g npm@latest
          cd frontend
          npm install

      - name: Build Windows portable app
        shell: bash
        run: |
          CGO_ENABLED=1 wails build -clean -platform ${{ matrix.platform }} \
          -webview2 embed \
          -ldflags "-X main.version=v${{ needs.prepare.outputs.version }}" \
          -o kardoo

      - name: Compress portable binary
        working-directory: ./build/bin
        run: Compress-Archive "kardoo.exe" "kardoo_${{ needs.prepare.outputs.version }}_${{ steps.normalise_platform.outputs.tag }}_portable.zip"

      - name: Upload portable
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: ./build/bin/kardoo_${{ needs.prepare.outputs.version }}_${{ steps.normalise_platform.outputs.tag }}_portable.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows NSIS installer
        shell: bash
        run: |
          export PATH="/c/Program Files (x86)/NSIS:$PATH"
          CGO_ENABLED=1 wails build -clean -platform ${{ matrix.platform }} \
          -nsis -webview2 embed \
          -ldflags "-X main.version=v${{ needs.prepare.outputs.version }}" \
          -o kardoo

      - name: Rename installer
        working-directory: ./build/bin
        run: Rename-Item -Path "kardoo-${{ steps.normalise_platform_name.outputs.pname }}-installer.exe" -NewName "kardoo_${{ needs.prepare.outputs.version }}_${{ steps.normalise_platform.outputs.tag }}_setup.exe"

      - name: Upload installer
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: ./build/bin/kardoo_${{ needs.prepare.outputs.version }}_${{ steps.normalise_platform.outputs.tag }}_setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}
